services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: iot_hub
      POSTGRES_USER: iot_user
      POSTGRES_PASSWORD: iot123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  iot-hub-api:
    build: .
    container_name: iot-hub-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/iot_hub
      DB_USERNAME: iot_user
      DB_PASSWORD: iot123
      AIRTHINGS_CLIENT_ID: ${AIRTHINGS_CLIENT_ID}
      AIRTHINGS_CLIENT_SECRET: ${AIRTHINGS_CLIENT_SECRET}
      AIRTHINGS_ACCOUNT_ID: ${AIRTHINGS_ACCOUNT_ID}
      SPRING_PROFILES_ACTIVE: prod
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_TO: ${MAIL_TO}
      SINOPE_BROKER_URL: tcp://mosquitto:1883
    depends_on:
      - postgres

volumes:
  postgres_data: